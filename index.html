<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PawPortal — Find Pet Care Near You</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #0d9488;
      --teal-dark: #0f766e;
      --teal-light: #ccfbf1;
      --orange: #f97316;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-500: #64748b;
      --gray-700: #334155;
      --gray-900: #0f172a;
      --nav-height: 80px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
    }

    /* ── NAV ── */
    nav {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 2rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      height: var(--nav-height);
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .nav-left { display: flex; align-items: center; }
    .nav-center { display: flex; justify-content: center; }
    .nav-right { display: flex; align-items: center; justify-content: flex-end; gap: 0.75rem; }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.3rem; font-weight: 800; color: var(--teal);
      text-decoration: none;
    }
    .logo-icon {
      width: 34px; height: 34px; background: var(--teal);
      border-radius: 9px; display: flex; align-items: center;
      justify-content: center; font-size: 1.1rem;
    }
    .nav-signin {
      background: var(--teal); color: white; text-decoration: none;
      padding: 0.45rem 1.1rem; border-radius: 8px;
      font-size: 0.875rem; font-weight: 600; transition: background 0.2s;
    }
    .nav-signin:hover { background: var(--teal-dark); }

    /* ── NAV SEARCH PILL ── */
    .nav-search-pill {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--gray-200);
      border-radius: 999px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      height: 52px;
      transition: box-shadow 0.2s;
    }
    .nav-search-pill:focus-within {
      box-shadow: 0 2px 16px rgba(0,0,0,0.14);
    }
    .pill-segment {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 18px;
      min-width: 0;
      cursor: pointer;
      position: relative;
    }
    .pill-segment + .pill-segment {
      border-left: 1.5px solid var(--gray-200);
    }
    .pill-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--gray-500);
      white-space: nowrap;
      margin-bottom: 1px;
    }
    .pill-segment select,
    .pill-segment input {
      border: none;
      outline: none;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--gray-900);
      background: transparent;
      font-family: inherit;
      padding: 0;
      width: 150px;
    }
    .pill-segment select { appearance: none; cursor: pointer; width: 130px; }
    .pill-search-btn {
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 999px;
      width: 38px; height: 38px;
      margin-right: 7px;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .pill-search-btn:hover { background: var(--teal-dark); }

    /* Location autocomplete */
    .autocomplete-dropdown {
      position: absolute;
      top: calc(100% + 14px);
      left: -18px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 16px 40px rgba(0,0,0,0.15);
      border: 1px solid var(--gray-200);
      z-index: 9999;
      min-width: 320px;
      overflow: hidden;
      display: none;
    }
    .autocomplete-dropdown.visible { display: block; }
    .autocomplete-item {
      padding: 0.85rem 1.1rem;
      font-size: 0.88rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.1s;
    }
    .autocomplete-item:hover { background: var(--gray-50); }
    .place-icon-box {
      width: 36px; height: 36px; flex-shrink: 0;
      background: var(--gray-100); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .autocomplete-item .place-name { font-weight: 600; color: var(--gray-900); line-height: 1.2; }
    .autocomplete-item .place-detail { font-size: 0.78rem; color: var(--gray-500); margin-top: 1px; }
    .autocomplete-loading {
      padding: 1rem 1.1rem; font-size: 0.85rem; color: var(--gray-500);
      display: flex; align-items: center; gap: 8px;
    }

    /* ── CATEGORY BAR ── */
    .category-bar {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: var(--nav-height);
      z-index: 190;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .category-bar::-webkit-scrollbar { display: none; }
    .category-bar-inner {
      display: flex;
      padding: 0 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .cat-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 14px 22px 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      color: var(--gray-500);
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .cat-btn:hover { color: var(--gray-900); border-color: var(--gray-300); }
    .cat-btn.active { color: var(--gray-900); border-color: var(--gray-900); font-weight: 600; }
    .cat-icon { font-size: 1.4rem; line-height: 1; }
    .cat-label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.01em; }

    /* ── MAIN CONTENT ── */
    .main-content { max-width: 1400px; margin: 0 auto; padding: 2rem 2.5rem; }

    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
    }
    .results-title { font-size: 1rem; font-weight: 600; color: var(--gray-700); }
    .results-title strong { color: var(--gray-900); }

    /* ── PROVIDER GRID ── */
    .providers-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
    }

    .provider-card {
      background: transparent;
      border-radius: 14px;
      overflow: visible;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .provider-card:hover { transform: translateY(-2px); }
    .provider-card:hover .card-banner { box-shadow: 0 8px 28px rgba(0,0,0,0.16); }

    .card-banner {
      height: 200px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    .card-type-pill {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      border-radius: 999px;
      padding: 0.2rem 0.65rem;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    .card-body {
      padding: 0.85rem 0.25rem 0;
    }
    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2px;
    }
    .card-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--gray-900);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      margin-right: 8px;
    }
    .card-rating {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--gray-900);
      flex-shrink: 0;
    }
    .stars { color: #f59e0b; font-size: 0.78rem; }
    .card-location { font-size: 0.82rem; color: var(--gray-500); margin-bottom: 1px; }
    .card-avail { font-size: 0.82rem; color: var(--gray-500); }

    /* Banner colors by type */
    .banner-vet      { background: linear-gradient(135deg, #e0f2fe, #bae6fd); }
    .banner-groomer  { background: linear-gradient(135deg, #fce7f3, #fbcfe8); }
    .banner-walker   { background: linear-gradient(135deg, #d1fae5, #a7f3d0); }
    .banner-trainer  { background: linear-gradient(135deg, #fef3c7, #fde68a); }
    .banner-boarding { background: linear-gradient(135deg, #ede9fe, #ddd6fe); }

    .badge-vet      { color: #0369a1; }
    .badge-groomer  { color: #9d174d; }
    .badge-walker   { color: #065f46; }
    .badge-trainer  { color: #92400e; }
    .badge-boarding { color: #5b21b6; }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1; text-align: center;
      padding: 4rem 2rem; color: var(--gray-500);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty-state h3 { font-size: 1rem; font-weight: 600; color: var(--gray-700); margin-bottom: 0.3rem; }

    /* ── FOOTER ── */
    footer {
      background: var(--gray-900); color: white;
      padding: 2rem; text-align: center; margin-top: 4rem;
    }
    .footer-logo { color: var(--teal); font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
    footer p { color: var(--gray-500); font-size: 0.82rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1200px) {
      .providers-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 900px) {
      .providers-grid { grid-template-columns: repeat(2, 1fr); }
      .pill-segment input, .pill-segment select { width: 110px; }
    }
    @media (max-width: 640px) {
      nav { grid-template-columns: 1fr auto; }
      .nav-center { display: none; }
      .main-content { padding: 1.5rem 1rem; }
      .providers-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    }
    @media (max-width: 420px) {
      .providers-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-left">
      <a href="/" class="logo">
        <div class="logo-icon">🐾</div>
        PawPortal
      </a>
    </div>

    <div class="nav-center">
      <div class="nav-search-pill">
        <div class="pill-segment">
          <span class="pill-label">Service</span>
          <select id="searchType" onchange="applyFilters()">
            <option value="all">All pet care</option>
            <option value="vet">Veterinarians</option>
            <option value="groomer">Groomers</option>
            <option value="walker">Dog Walkers</option>
            <option value="trainer">Trainers</option>
            <option value="boarding">Boarding</option>
          </select>
        </div>
        <div class="pill-segment">
          <span class="pill-label">Location</span>
          <input type="text" id="searchLocation" placeholder="City or neighborhood…" autocomplete="off" />
          <div class="autocomplete-dropdown" id="locationDropdown"></div>
        </div>
        <button class="pill-search-btn" onclick="applyFilters()" aria-label="Search">🔍</button>
      </div>
    </div>

    <div class="nav-right">
      <a href="/login.html" class="nav-signin" id="navLoginBtn">Sign In</a>
    </div>
  </nav>

  <!-- CATEGORY BAR -->
  <div class="category-bar">
    <div class="category-bar-inner">
      <button class="cat-btn active" onclick="setFilter('all', this)">
        <span class="cat-icon">🐾</span>
        <span class="cat-label">All</span>
      </button>
      <button class="cat-btn" onclick="setFilter('vet', this)">
        <span class="cat-icon">🏥</span>
        <span class="cat-label">Vets</span>
      </button>
      <button class="cat-btn" onclick="setFilter('groomer', this)">
        <span class="cat-icon">✂️</span>
        <span class="cat-label">Groomers</span>
      </button>
      <button class="cat-btn" onclick="setFilter('walker', this)">
        <span class="cat-icon">🦮</span>
        <span class="cat-label">Walkers</span>
      </button>
      <button class="cat-btn" onclick="setFilter('trainer', this)">
        <span class="cat-icon">🎓</span>
        <span class="cat-label">Trainers</span>
      </button>
      <button class="cat-btn" onclick="setFilter('boarding', this)">
        <span class="cat-icon">🏠</span>
        <span class="cat-label">Boarding</span>
      </button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <div class="results-header">
      <div class="results-title" id="resultsTitle">Loading providers…</div>
    </div>

    <!-- Provider cards -->
    <div class="providers-grid" id="providersGrid">
      <div class="empty-state">
        <div class="icon">🐾</div>
        <h3>Loading providers…</h3>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo">🐾 PawPortal</div>
    <p>Connecting pet owners with trusted care providers everywhere.</p>
  </footer>

  <script type="module">
    import { supabase } from '/js/supabase.js';

    let allProviders = [];
    let activeFilter = 'all';

    // ── Location Autocomplete ──
    let autocompleteTimer = null;
    let selectedLocation = null;

    const locationInput = document.getElementById('searchLocation');
    const dropdown = document.getElementById('locationDropdown');

    locationInput.addEventListener('input', () => {
      const q = locationInput.value.trim();
      clearTimeout(autocompleteTimer);
      if (q.length < 2) { dropdown.classList.remove('visible'); return; }

      dropdown.innerHTML = `<div class="autocomplete-loading">🔍 Searching…</div>`;
      dropdown.classList.add('visible');

      autocompleteTimer = setTimeout(() => fetchLocations(q), 350);
    });

    locationInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') dropdown.classList.remove('visible');
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.pill-segment')) dropdown.classList.remove('visible');
    });

    const MAPBOX_TOKEN = ['pk.eyJ1IjoidGltYWxwZXJz','IiwiYSI6ImNtbnNiaDkyYjBiNG4z','Mm9kNzFzZmJsdXoifQ.6OvuYWuuO_jJc1PpHuvm2g'].join('');

    async function fetchLocations(query) {
      try {
        const res = await fetch(
          `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json` +
          `?access_token=${MAPBOX_TOKEN}&country=us&types=place,neighborhood,locality,address&limit=6&language=en`
        );
        const data = await res.json();
        renderDropdown(data.features || []);
      } catch {
        dropdown.classList.remove('visible');
      }
    }

    function renderDropdown(features) {
      if (!features.length) {
        dropdown.innerHTML = `<div class="autocomplete-loading">No results found</div>`;
        return;
      }
      dropdown.innerHTML = features.map((f) => {
        const type    = f.place_type[0];
        const name    = f.text;
        const ctx     = f.context || [];
        const city    = (ctx.find(c => c.id.startsWith('place'))?.text) || (type === 'place' ? name : '');
        const state   = ctx.find(c => c.id.startsWith('region'))?.text || '';
        const detail  = f.place_name.split(`${name}, `)[1] || f.place_name;
        const icon    = type === 'place'    ? '🏙️'
                      : type === 'neighborhood' || type === 'locality' ? '📍'
                      : type === 'address' ? '📌' : '📍';
        const lat = f.center[1];
        const lon = f.center[0];
        const safeName = name.replace(/'/g, "\\'");
        const safeCity = city.replace(/'/g, "\\'");
        const safeState = state.replace(/'/g, "\\'");
        return `<div class="autocomplete-item" onclick="selectLocation('${safeName}', '${safeCity}', '${safeState}', '${lat}', '${lon}')">
          <div class="place-icon-box">${icon}</div>
          <div>
            <div class="place-name">${name}</div>
            <div class="place-detail">${detail}</div>
          </div>
        </div>`;
      }).join('');
    }

    window.selectLocation = function(name, city, state, lat, lon) {
      selectedLocation = { name, city, state, lat: parseFloat(lat), lon: parseFloat(lon) };
      locationInput.value = name + (city && name !== city ? `, ${city}` : '') + (state ? `, ${state}` : '');
      dropdown.classList.remove('visible');
      applyFilters();
    };

    // Update nav if logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      const { data: profile } = await supabase.from('profiles').select('role').eq('id', session.user.id).single();
      const btn = document.getElementById('navLoginBtn');
      if (profile?.role === 'admin')       { btn.textContent = '⚡ Admin';      btn.href = '/admin/'; }
      else if (profile?.role === 'clinic') { btn.textContent = 'Dashboard';     btn.href = '/clinic/'; }
      else                                 { btn.textContent = 'My Account';    btn.href = '/account/'; }
    }

    // Load providers
    async function loadProviders() {
      const { data, error } = await supabase
        .from('providers')
        .select('*')
        .eq('status', 'approved')
        .order('rating', { ascending: false });

      if (error || !data) {
        document.getElementById('resultsTitle').textContent = 'Could not load providers.';
        return;
      }
      allProviders = data;
      renderProviders(allProviders);
    }

    function renderProviders(providers) {
      const grid  = document.getElementById('providersGrid');
      const title = document.getElementById('resultsTitle');

      const loc = locationInput.value.trim();
      const locLabel = loc ? ` near "${loc}"` : ' in Boston, MA';
      title.innerHTML = `<strong>${providers.length} providers</strong> ${locLabel}`;

      if (providers.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><h3>No providers found</h3><p>Try a different filter or location</p></div>`;
        return;
      }

      const typeLabels = { vet: 'Veterinarian', groomer: 'Groomer', walker: 'Dog Walker', trainer: 'Trainer', boarding: 'Boarding' };

      grid.innerHTML = providers.map(p => {
        const rating    = p.rating.toFixed(1);
        const stars     = '★'.repeat(Math.floor(p.rating));
        const typeLabel = typeLabels[p.type] || p.type;
        return `
          <div class="provider-card" onclick="window.location.href='/provider.html?id=${p.id}'">
            <div class="card-banner banner-${p.type}">
              <span class="card-type-pill badge-${p.type}">${typeLabel}</span>
              ${p.avatar}
            </div>
            <div class="card-body">
              <div class="card-header-row">
                <div class="card-name">${p.name}</div>
                <div class="card-rating"><span class="stars">${stars}</span> ${rating}</div>
              </div>
              <div class="card-location">${p.neighborhood}, ${p.city}</div>
              <div class="card-avail">Next: ${p.next_available}</div>
            </div>
          </div>`;
      }).join('');
    }

    // Filter logic
    window.setFilter = function(type, btn) {
      activeFilter = type;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('searchType').value = type;
      applyFilters();
    };

    window.applyFilters = function() {
      const type   = document.getElementById('searchType').value;
      const rawLoc = locationInput.value.trim().toLowerCase();

      // Sync category bar with dropdown
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.cat-btn').forEach(b => {
        if (b.getAttribute('onclick').includes(`'${type}'`)) b.classList.add('active');
      });

      let filtered = allProviders;
      if (type !== 'all') filtered = filtered.filter(p => p.type === type);
      if (rawLoc) {
        const locQuery = selectedLocation?.city?.toLowerCase() || rawLoc;
        filtered = filtered.filter(p =>
          p.city.toLowerCase().includes(locQuery) ||
          p.neighborhood.toLowerCase().includes(locQuery) ||
          p.state.toLowerCase().includes(locQuery) ||
          p.name.toLowerCase().includes(locQuery)
        );
      }
      renderProviders(filtered);
    };

    loadProviders();
  </script>

</body>
</html>
