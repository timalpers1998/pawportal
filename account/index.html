<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PawPortal — My Appointments</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #0d9488;
      --teal-dark: #0f766e;
      --teal-light: #ccfbf1;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-500: #64748b;
      --gray-700: #334155;
      --gray-900: #0f172a;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
    }
    nav {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; position: sticky; top: 0; z-index: 100;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.2rem; font-weight: 700; color: var(--teal);
      text-decoration: none;
    }
    .logo-icon {
      width: 32px; height: 32px; background: var(--teal);
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 1rem;
    }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .user-name { font-size: 0.9rem; font-weight: 600; color: var(--gray-700); }
    .logout-btn {
      background: none; border: 1.5px solid var(--gray-200);
      color: var(--gray-700); padding: 0.4rem 0.9rem;
      border-radius: 8px; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: #dc2626; color: #dc2626; }

    main { max-width: 760px; margin: 0 auto; padding: 2.5rem 2rem; }

    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.6rem; font-weight: 800; }
    .page-header p { color: var(--gray-500); margin-top: 0.3rem; }

    .book-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--teal); color: white; text-decoration: none;
      padding: 0.65rem 1.3rem; border-radius: 10px;
      font-size: 0.9rem; font-weight: 700;
      transition: background 0.2s; margin-top: 1rem;
    }
    .book-btn:hover { background: var(--teal-dark); }

    .section-label {
      font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--gray-500); margin-bottom: 1rem;
    }

    .appointments-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2.5rem; }

    .appt-card {
      background: white;
      border: 1.5px solid var(--gray-200);
      border-radius: 14px;
      padding: 1.3rem 1.5rem;
      display: flex; align-items: center; gap: 1.2rem;
    }
    .appt-card.upcoming { border-left: 4px solid var(--teal); }
    .appt-card.past { opacity: 0.65; }
    .appt-card.cancelled { border-left: 4px solid #dc2626; opacity: 0.6; }

    .appt-date-block {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 0.6rem 0.9rem;
      text-align: center;
      min-width: 56px;
      flex-shrink: 0;
    }
    .appt-month { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--teal); }
    .appt-day { font-size: 1.5rem; font-weight: 800; color: var(--gray-900); line-height: 1.1; }

    .appt-info { flex: 1; }
    .appt-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.2rem; }
    .appt-meta { font-size: 0.82rem; color: var(--gray-500); }

    .status-badge {
      display: inline-flex; align-items: center;
      padding: 0.2rem 0.6rem; border-radius: 999px;
      font-size: 0.75rem; font-weight: 600;
    }
    .status-pending   { background: #fef9c3; color: #854d0e; }
    .status-confirmed { background: #dcfce7; color: #166534; }
    .status-cancelled { background: #fee2e2; color: #991b1b; }

    .cancel-btn {
      background: none; border: 1.5px solid var(--gray-200);
      color: var(--gray-500); padding: 0.3rem 0.7rem;
      border-radius: 8px; font-size: 0.8rem; cursor: pointer;
      transition: all 0.2s; flex-shrink: 0;
    }
    .cancel-btn:hover { border-color: #dc2626; color: #dc2626; }

    .empty-state {
      text-align: center; padding: 3rem 2rem;
      background: white; border: 1px solid var(--gray-200);
      border-radius: 14px; color: var(--gray-500);
    }
    .empty-state .icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 0.9rem; }

    .loading { text-align: center; padding: 3rem; color: var(--gray-500); font-size: 0.9rem; }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">
      <div class="logo-icon">🐾</div>
      PawPortal
    </a>
    <div class="nav-right">
      <span class="user-name" id="userName"></span>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>My Appointments</h1>
      <p>Track and manage your pet's upcoming visits</p>
      <a href="/" class="book-btn">+ Book New Appointment</a>
    </div>

    <div id="loadingState" class="loading">Loading your appointments…</div>

    <div id="content" style="display:none">
      <div class="section-label">Upcoming</div>
      <div class="appointments-list" id="upcomingList"></div>

      <div class="section-label">Past & Cancelled</div>
      <div class="appointments-list" id="pastList"></div>
    </div>
  </main>

  <script type="module">
    import { supabase } from '/js/supabase.js';

    // Auth guard
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = '/login.html'; }

    // Load profile
    const { data: profile } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', session.user.id)
      .single();

    if (profile?.role === 'clinic') { window.location.href = '/clinic/'; }

    const displayName = profile?.full_name || session.user.email;
    document.getElementById('userName').textContent = '👤 ' + displayName;

    // Load bookings — use owner_id FK if available, fall back to email match
    const { data: bookings } = await supabase
      .from('bookings')
      .select('*')
      .or(`owner_id.eq.${session.user.id},email.eq.${session.user.email}`)
      .order('appointment_date', { ascending: true });

    const today = new Date().toISOString().split('T')[0];
    const upcoming = (bookings || []).filter(b => b.appointment_date >= today && b.status !== 'cancelled');
    const past     = (bookings || []).filter(b => b.appointment_date < today  || b.status === 'cancelled');

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    function renderCard(b, isPast) {
      const d = new Date(b.appointment_date + 'T12:00:00');
      const month = d.toLocaleDateString('en-US', { month: 'short' });
      const day   = d.getDate();
      const full  = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      const statusClass = `status-${b.status}`;
      const statusLabel = b.status.charAt(0).toUpperCase() + b.status.slice(1);
      const cancelBtn = !isPast && b.status !== 'cancelled'
        ? `<button class="cancel-btn" onclick="cancelBooking('${b.id}')">Cancel</button>`
        : '';
      const cardClass = b.status === 'cancelled' ? 'cancelled' : isPast ? 'past' : 'upcoming';

      return `<div class="appt-card ${cardClass}">
        <div class="appt-date-block">
          <div class="appt-month">${month}</div>
          <div class="appt-day">${day}</div>
        </div>
        <div class="appt-info">
          <div class="appt-title">${b.service_type} — ${b.pet_name}</div>
          <div class="appt-meta">${b.clinic} · ${b.appointment_time} · ${full}</div>
          <div style="margin-top:0.4rem"><span class="status-badge ${statusClass}">${statusLabel}</span></div>
        </div>
        ${cancelBtn}
      </div>`;
    }

    function renderList(id, items, emptyMsg) {
      const el = document.getElementById(id);
      if (items.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>${emptyMsg}</p></div>`;
      } else {
        el.innerHTML = items.map(b => renderCard(b, id === 'pastList')).join('');
      }
    }

    renderList('upcomingList', upcoming, 'No upcoming appointments. Book one above!');
    renderList('pastList', past, 'No past appointments yet.');

    window.cancelBooking = async function(id) {
      if (!confirm('Are you sure you want to cancel this appointment?')) return;
      await supabase.from('bookings').update({ status: 'cancelled' }).eq('id', id);
      window.location.reload();
    };

    window.logout = async function() {
      await supabase.auth.signOut();
      window.location.href = '/login.html';
    };
  </script>

</body>
</html>
