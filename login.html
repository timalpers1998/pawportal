<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PawPortal — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #0d9488;
      --teal-dark: #0f766e;
      --teal-light: #ccfbf1;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-500: #64748b;
      --gray-700: #334155;
      --gray-900: #0f172a;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.5rem;
      font-weight: 800;
      color: white;
      text-decoration: none;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--gray-200);
    }
    .tab {
      flex: 1;
      padding: 1.2rem;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--gray-500);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: var(--gray-50);
    }
    .tab:first-child { border-right: 1px solid var(--gray-200); }
    .tab.active {
      color: var(--gray-900);
      border-bottom-color: var(--gray-900);
      background: white;
    }

    /* Form */
    .form-body { padding: 1.8rem 2rem 1.5rem; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.1rem;
    }
    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--gray-700);
    }
    input {
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      color: var(--gray-900);
      background: var(--gray-50);
      transition: all 0.2s;
      font-family: inherit;
      width: 100%;
    }
    input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
      background: white;
    }

    .submit-btn {
      width: 100%;
      background: var(--teal);
      color: white;
      border: none;
      padding: 0.85rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.25rem;
    }
    .submit-btn:hover { background: var(--teal-dark); transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error-msg.visible { display: block; }

    .success-msg {
      background: var(--teal-light);
      border: 1px solid #99f6e4;
      color: var(--teal-dark);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .success-msg.visible { display: block; }

    /* Clinic CTA at bottom of card */
    .clinic-cta {
      border-top: 1px solid var(--gray-200);
      padding: 1rem 2rem;
      text-align: center;
      font-size: 0.83rem;
      color: var(--gray-500);
      background: var(--gray-50);
    }
    .clinic-cta a {
      color: var(--teal);
      font-weight: 600;
      text-decoration: none;
    }
    .clinic-cta a:hover { text-decoration: underline; }

    .back-link {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.85rem;
      margin-top: 1.5rem;
      display: block;
      text-align: center;
      transition: color 0.2s;
    }
    .back-link:hover { color: white; }

    /* Show/hide fields */
    .signup-only { display: none; }
  </style>
</head>
<body>

  <a href="/" class="logo">
    <div class="logo-icon">🐾</div>
    PawPortal
  </a>

  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tabSignin" onclick="setTab('signin')">Sign In</div>
      <div class="tab" id="tabSignup" onclick="setTab('signup')">Create Account</div>
    </div>

    <div class="form-body">
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="authForm">
        <div class="form-group signup-only" id="nameGroup">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Jane Smith" autocomplete="name" />
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
      </form>
    </div>

    <div class="clinic-cta">
      Are you a clinic? <a href="/join.html">Apply to list your practice →</a>
    </div>
  </div>

  <a href="/" class="back-link">← Back to home</a>

  <script type="module">
    import { supabase } from '/js/supabase.js';

    let currentTab = 'signin';

    // If already logged in, route immediately
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      const { data: profile } = await supabase
        .from('profiles').select('role').eq('id', session.user.id).single();
      routeByRole(profile?.role);
    }

    function routeByRole(role) {
      if (role === 'admin')  { window.location.href = '/admin/';   return; }
      if (role === 'clinic') { window.location.href = '/clinic/';  return; }
      window.location.href = '/account/';
    }

    window.setTab = function(tab) {
      currentTab = tab;
      document.getElementById('tabSignin').classList.toggle('active', tab === 'signin');
      document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
      const isSignup = tab === 'signup';
      document.querySelectorAll('.signup-only').forEach(el => {
        el.style.display = isSignup ? 'flex' : 'none';
      });
      document.getElementById('submitBtn').textContent = isSignup ? 'Create Account' : 'Sign In';
      document.getElementById('password').autocomplete = isSignup ? 'new-password' : 'current-password';
      clearMessages();
    };

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg; el.classList.add('visible');
      document.getElementById('successMsg').classList.remove('visible');
    }
    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg; el.classList.add('visible');
      document.getElementById('errorMsg').classList.remove('visible');
    }
    function clearMessages() {
      document.getElementById('errorMsg').classList.remove('visible');
      document.getElementById('successMsg').classList.remove('visible');
    }

    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Please wait…';
      clearMessages();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (currentTab === 'signin') {
        // ── Sign In ──
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          showError(error.message);
          btn.disabled = false; btn.textContent = 'Sign In'; return;
        }
        const { data: profile } = await supabase
          .from('profiles').select('role').eq('id', data.user.id).single();
        routeByRole(profile?.role);

      } else {
        // ── Create Account (pet owner) ──
        const fullName = document.getElementById('fullName').value.trim();
        if (!fullName) {
          showError('Please enter your full name.');
          btn.disabled = false; btn.textContent = 'Create Account'; return;
        }
        if (password.length < 8) {
          showError('Password must be at least 8 characters.');
          btn.disabled = false; btn.textContent = 'Create Account'; return;
        }

        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) {
          showError(error.message);
          btn.disabled = false; btn.textContent = 'Create Account'; return;
        }

        // Create owner profile
        await supabase.from('profiles').insert({
          id: data.user.id,
          role: 'owner',
          full_name: fullName,
        });

        showSuccess('Account created! You can now sign in.');
        btn.disabled = false; btn.textContent = 'Create Account';
        setTab('signin');
      }
    });
  </script>

</body>
</html>
